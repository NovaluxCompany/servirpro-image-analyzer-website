@if (isVisible) {
  <!-- Overlay -->
  <div class="fixed inset-0 z-50 flex items-start justify-center p-4 bg-black/60 backdrop-blur-sm overflow-y-auto">

    <div class="relative w-full max-w-4xl my-6 bg-white rounded-2xl shadow-2xl flex flex-col">

      <!-- Header -->
      <div class="flex items-center justify-between px-6 py-4 bg-gradient-to-r from-blue-600 to-blue-800 rounded-t-2xl">

        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-white/20 rounded-lg flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"
              />
            </svg>
          </div>

          <div>
            <h2 class="text-lg font-semibold text-white">
              Nuevo Permiso
            </h2>
            <p class="text-sm text-blue-100">
              Completa la información para configurar el acceso
            </p>
          </div>
        </div>

        <!-- Botón cerrar -->
        <button
          type="button"
          (click)="onClose()"
          class="text-white hover:bg-white/20 rounded-lg p-2 transition"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Body -->
      <div class="flex-1 overflow-y-auto p-6 space-y-6">

        <form>

          <!-- SECCION 1: INFORMACIÓN DEL PERMISO -->
          <div class="border border-gray-200 rounded-xl overflow-hidden">

            <div class="flex items-center gap-3 px-4 py-3 bg-blue-50 border-b border-blue-100">
              <div class="w-6 h-6 bg-blue-600 rounded-full flex items-center justify-center">
                <span class="text-xs font-bold text-white">1</span>
              </div>

              <h3 class="font-semibold text-blue-800 text-sm">
                Datos del Permiso
              </h3>
            </div>

            <div class="p-4 grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">

              <!-- Nombre -->
              <div>
                <label class="block mb-1.5 text-xs font-semibold text-gray-700">
                  Nombre del Permiso
                  <span class="text-red-500">*</span>
                </label>

                <input
                  type="text"
                  placeholder="Ej: Ver Usuarios"
                  class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
                />
              </div>

              <!-- Código -->
              <div>
                <label class="block mb-1.5 text-xs font-semibold text-gray-700">
                  Código de Acceso
                  <span class="text-red-500">*</span>
                </label>

                <input
                  type="text"
                  placeholder="Ej: VIEW_USERS"
                  class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
                />
              </div>

            </div>
          </div>

        </form>
      </div>

      <!-- Footer -->
      <div class="flex items-center justify-end gap-3 px-6 py-4 bg-gray-50 border-t border-gray-200 rounded-b-2xl">
        <button
          type="button"
          (click)="onClose()"
          class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition"
        >
          Cancelar
        </button>
        <button
          type="button"
          class="px-5 py-2 text-sm font-medium text-white bg-blue-700 rounded-lg hover:bg-blue-800 shadow-md transition"
        >
          Crear Permiso
        </button>
      </div>
    </div>
  </div>
}
