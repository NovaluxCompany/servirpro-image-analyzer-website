<div class="space-y-4">
  <div class="flex items-center justify-between">
    <label class="block text-sm font-medium text-gray-900">
      Comprobantes de pago
      @if (getFileCount() > 0) {
        <span class="ml-2 text-xs text-gray-500">({{ getFileCount() }}/10)</span>
      }
    </label>
  </div>

  <!-- Drop Zone -->
  <div 
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
    [class.border-blue-500]="isDragging()"
    [class.bg-blue-50]="isDragging()"
    class="flex flex-col items-center justify-center w-full h-64 border-2 border-gray-300 border-dashed rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100 transition-colors"
  >
    <label for="file-upload" class="flex flex-col items-center justify-center w-full h-full cursor-pointer">
      <div class="flex flex-col items-center justify-center pt-5 pb-6">
        <svg class="w-10 h-10 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
        </svg>
        <p class="mb-2 text-sm text-gray-500">
          <span class="font-semibold">Haz clic para subir</span> o arrastra y suelta
        </p>
        <p class="text-xs text-gray-500">PNG, JPG o JPEG (Máx. 5MB por archivo, máx. 10 archivos)</p>
      </div>
      <input 
        id="file-upload" 
        type="file" 
        class="hidden" 
        multiple
        accept="image/jpeg,image/jpg,image/png"
        (change)="onFileSelected($event)"
      >
    </label>
  </div>

  <!-- Error Message -->
  @if (errorMessage()) {
    <div class="p-4 text-sm text-red-800 rounded-lg bg-red-100" role="alert">
      <span class="font-medium">Error:</span> {{ errorMessage() }}
    </div>
  }

  <!-- Image Previews -->
  @if (images().length > 0) {
    <div class="grid grid-cols-2 gap-4 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5">
      @for (image of images(); track $index) {
        <div class="relative group">
          <img 
            [src]="image.url" 
            [alt]="image.file.name"
            class="object-cover w-full h-32 border border-gray-300 rounded-lg"
          >
          <button
            type="button"
            (click)="removeImage($index)"
            class="absolute top-1 right-1 p-1 text-white bg-red-600 rounded-full opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-700 focus:ring-2 focus:ring-red-300"
            title="Eliminar imagen"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
          <p class="mt-1 text-xs text-gray-500 truncate" [title]="image.file.name">
            {{ image.file.name }}
          </p>
        </div>
      }
    </div>
  }
</div>
