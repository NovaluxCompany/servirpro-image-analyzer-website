<div class="searchable-select-host relative">

  <!-- Trigger button -->
  <div
    (click)="openDropdown()"
    [class]="'flex items-center justify-between w-full px-3 py-2 text-sm border rounded-lg cursor-pointer bg-white select-none ' +
      (isInvalid ? 'border-red-400' : 'border-gray-300') +
      (isDisabled() ? ' opacity-50 cursor-not-allowed' : ' hover:border-blue-400')">
    <span [class]="selectedLabel() ? 'text-gray-900' : 'text-gray-400'">
      {{ selectedLabel() || placeholder }}
    </span>
    <div class="flex items-center gap-1">
      @if (selectedValue()) {
        <button type="button" (click)="$event.stopPropagation(); clearSelection()"
          class="w-4 h-4 flex items-center justify-center rounded-full text-gray-400 hover:text-gray-600 hover:bg-gray-100">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      }
      <svg class="w-4 h-4 text-gray-400 transition-transform" [class.rotate-180]="isOpen()"
        fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
      </svg>
    </div>
  </div>

  <!-- Dropdown panel -->
  @if (isOpen()) {
    <div class="absolute z-50 w-full mt-1 bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden">
      <!-- Search input -->
      <div class="p-2 border-b border-gray-100">
        <input
          #inputRef
          type="text"
          [(ngModel)]="searchText"
          [placeholder]="'Buscar...'"
          (click)="$event.stopPropagation()"
          autofocus
          class="w-full px-2 py-1.5 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <!-- Options list -->
      <ul class="max-h-48 overflow-y-auto">
        @if (filteredOptions.length === 0) {
          <li class="px-3 py-2 text-sm text-gray-400 text-center">Sin resultados</li>
        }
        @for (opt of filteredOptions; track opt.value) {
          <li (click)="selectOption(opt)"
            [class]="'px-3 py-2 text-sm cursor-pointer transition-colors ' +
              (opt.value === selectedValue() ? 'bg-blue-50 text-blue-700 font-medium' : 'text-gray-700 hover:bg-gray-50')">
            {{ opt.label }}
          </li>
        }
      </ul>
    </div>
  }

</div>
